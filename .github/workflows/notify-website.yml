name: Notify timmysay.com of new articles

on:
  push:
    branches: [main, master]
    paths:
      - "artikel/**"
      - "feed.xml"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Fire repository_dispatch to timmysay-website
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.WEBSITE_SYNC_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/timmysay/timmysay-website/dispatches \
            -d '{"event_type":"new-article"}'
